# Application — ITIC Career Center
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}
spring.application.name=itic-career-center-api
server.servlet.context-path=/api/v1

# JWT
security.jwt.token.secret-key=${SECRET_KEY:dev-secret-key-change-in-production}
security.jwt.token.refresh-secret-key=${REFRESH_SECRET_KEY:dev-refresh-secret-key-change-in-production}
security.jwt.token.expiration=${TOKEN_EXPIRATION_TIME:3600000}
security.jwt.token.refresh-expiration=${REFRESH_TOKEN_EXPIRATION_TIME:604800000}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:itic_career_center}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# OTP
app.otp.expiration-minutes=10
app.otp.length=6
app.mail.from=${SMTP_FROM:no-reply@itic-career-center.fr}
app.brand.name=ITIC Career Center

# Premier administrateur (désactiver en production après création)
app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.first-name=${BOOTSTRAP_ADMIN_FIRST_NAME:Admin}
app.bootstrap.admin.last-name=${BOOTSTRAP_ADMIN_LAST_NAME:ITIC}

# Mail (SMTP)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS (React PWA + espace conseiller)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
