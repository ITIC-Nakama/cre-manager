name: Continuous Deployment (CD)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to L2TP/IPsec VPN
        env:
          VPN_HOST: ${{ secrets.VPN_HOST }}
          VPN_PSK: ${{ secrets.VPN_PSK }}
          VPN_USER: ${{ secrets.VPN_USER }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y strongswan xl2tpd

          sudo tee /etc/ipsec.conf <<EOF
conn myvpn
  keyexchange=ikev1
  authby=secret
  type=transport
  left=%defaultroute
  leftprotoport=17/1701
  right=${VPN_HOST}
  rightprotoport=17/1701
  auto=add
EOF

          sudo tee /etc/ipsec.secrets <<EOF
%any ${VPN_HOST} : PSK "${VPN_PSK}"
EOF

          sudo tee /etc/xl2tpd/xl2tpd.conf <<EOF
[lac myvpn]
lns = ${VPN_HOST}
ppp optfile = /etc/ppp/options.l2tpd.client
length bit = yes
EOF

          sudo mkdir -p /etc/ppp
          sudo tee /etc/ppp/options.l2tpd.client <<EOF
ipcp-accept-local
ipcp-accept-remote
refuse-eap
refuse-pap
refuse-chap
refuse-mschap
require-mschap-v2
noccp
noauth
idle 1800
mtu 1410
mru 1410
defaultroute
usepeerdns
debug
lock
connect-delay 5000
name ${VPN_USER}
password ${VPN_PASSWORD}
EOF

          sudo systemctl restart strongswan-starter 2>/dev/null || sudo systemctl restart strongswan 2>/dev/null || sudo service strongswan restart 2>/dev/null || true
          sudo systemctl restart xl2tpd 2>/dev/null || sudo service xl2tpd restart 2>/dev/null || true

          sudo ipsec rereadsecrets
          sudo ipsec reload
          sudo ipsec up myvpn

          sudo mkdir -p /var/run/xl2tpd
          sudo touch /var/run/xl2tpd/l2tp-control
          echo "c myvpn" | sudo tee /var/run/xl2tpd/l2tp-control

          for i in {1..30}; do
            if ip addr show | grep -q "ppp0"; then
              echo "✅ VPN Connected successfully!"
              break
            fi
            sleep 1
          done

          if ! ip addr show | grep -q "ppp0"; then
            echo "❌ VPN Connection failed."
            sudo ipsec status
            exit 1
          fi

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            if [ ! -d "$HOME/cre-manager" ]; then
              git clone git@github.com:ITIC-Nakama/cre-manager.git "$HOME/cre-manager"
            fi
            cd "$HOME/cre-manager"
            git pull origin main
            docker compose up -d --build --remove-orphans
            docker image prune -f

      - name: Notify Discord on Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Déploiement ITIC CRE Réussi\",
                \"description\": \"Le déploiement continu s'est terminé avec succès sur le serveur privé.\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"${COMMIT_SHA}\", \"inline\": true},
                  {\"name\": \"Branche\", \"value\": \"${BRANCH}\", \"inline\": true}
                ]
              }]
            }" "${DISCORD_WEBHOOK}"

      - name: Notify Discord on Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Échec du Déploiement ITIC CRE\",
                \"description\": \"Une erreur est survenue durant le déploiement sur le serveur privé.\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"${COMMIT_SHA}\", \"inline\": true},
                  {\"name\": \"Branche\", \"value\": \"${BRANCH}\", \"inline\": true}
                ]
              }]
            }" "${DISCORD_WEBHOOK}"