name: Continuous Deployment (C-D)

on:
  push:
    branches:
      - main

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Compilation du Backend Spring Boot
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend with Maven
        run: |
          cd itic-cre-backend
          mvn -B -DskipTests package

      # Compilation du Frontend React
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend with Vite/React
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV_CONTENT }}
        run: |
          cd itic-cre-frontend
          
          # Injection des variables spécifiques au Frontend au moment du Build
          echo "$FRONTEND_ENV" > .env
          
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run build

      # Sauvegarde des artefacts pour le job de déploiement
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: itic-cre-backend/target/*.jar

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: itic-cre-frontend/dist/

      - name: Notify Discord on Build Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\":[{\"title\":\"Echec de la compilation ITIC CRE\",\"description\":\"La compilation du backend ou du frontend a echoue.\",\"color\":15158332,\"fields\":[{\"name\":\"Commit\",\"value\":\"${COMMIT_SHA}\",\"inline\":true},{\"name\":\"Branche\",\"value\":\"${BRANCH}\",\"inline\":true}]}]}" \
            "${DISCORD_WEBHOOK}"

  deploy:
    needs: build-and-compile
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Récupération du fichier JAR
      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: itic-cre-backend

      # Récupération des fichiers React (dist)
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: itic-cre-frontend/dist

      # Déploiement sur l'environnement natif du serveur
      - name: Deploy application in Native Mode
        working-directory: ${{ github.workspace }}
        env:
          ENV_DATA: ${{ secrets.BACKEND_ENV_CONTENT }}
        run: |
          # 1. Configuration de l'environnement du Backend sur le serveur
          echo "$ENV_DATA" > itic-cre-backend/.env
          
          # S'assurer que STORAGE_LOCAL_DIR pointe vers un dossier persistant hors du workspace git
          if ! grep -q "STORAGE_LOCAL_DIR" itic-cre-backend/.env; then
            echo "STORAGE_LOCAL_DIR=/var/itic-cre/uploads" >> itic-cre-backend/.env
          fi
          
          sudo mkdir -p /var/itic-cre/uploads
          sudo chown -R github-runner:github-runner /var/itic-cre
          
          # Ajuster les permissions pour s'assurer que le runner peut manipuler les fichiers
          sudo chown -R github-runner:github-runner itic-cre-backend
          
          # 2. Déploiement du Frontend (Nettoyage et copie vers le répertoire Nginx)
          sudo rm -rf /var/www/html/*
          sudo cp -r itic-cre-frontend/dist/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html/
          
          # 3. Redémarrage des services natifs du serveur
          sudo systemctl restart itic-backend.service
          sudo systemctl restart nginx

      # Notifications Discord
      - name: Notify Discord on Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\":[{\"title\":\"Deploiement ITIC CRE Reussi \",\"description\":\"L'application a ete deployee avec succes en mode natif.\",\"color\":3066993,\"fields\":[{\"name\":\"Commit\",\"value\":\"${COMMIT_SHA}\",\"inline\":true},{\"name\":\"Branche\",\"value\":\"${BRANCH}\",\"inline\":true}]}]}" \
            "${DISCORD_WEBHOOK}"

      - name: Notify Discord on Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\":[{\"title\":\"Echec du Deploiement ITIC CRE\",\"description\":\"Une erreur est survenue durant la phase de deploiement natif.\",\"color\":15158332,\"fields\":[{\"name\":\"Commit\",\"value\":\"${COMMIT_SHA}\",\"inline\":true},{\"name\":\"Branche\",\"value\":\"${BRANCH}\",\"inline\":true}]}]}" \
            "${DISCORD_WEBHOOK}"