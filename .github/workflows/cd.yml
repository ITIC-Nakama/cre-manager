name: Continuous Deployment (CD)

on:
  push:
    branches:
      - main

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Compilation du Backend Spring Boot
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend with Maven
        run: |
          cd itic-cre-backend
          mvn -B -DskipTests package

      # Compilation du Frontend React
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend with Vite/React
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL || 'http://localhost:8080/api/v1' }}
        run: |
          cd itic-cre-frontend
          # Inclut les dépendances optionnelles pour récupérer les binaires natifs Linux requis par Rolldown
          npm install --include=optional
          npm run build

      # Sauvegarde des artefacts compilés pour le job suivant
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-application
          path: |
            itic-cre-backend/target/*.jar
            itic-cre-frontend/dist/

  deploy:
    needs: build-and-compile
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Récupération des fichiers compilés par GitHub
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: compiled-application

      - name: Deploy application
        working-directory: ${{ github.workspace }}
        env:
          ENV_DATA: ${{ secrets.ENV_FILE_CONTENT }}
        run: |
          # Régénérer le fichier .env à partir du secret GitHub
          echo "$ENV_DATA" > .env
          
          # Lancer Docker Compose (les Dockerfiles n'utilisent plus d'instruction RUN)
          docker compose down
          docker compose up -d --build --remove-orphans
          docker image prune -f

      - name: Notify Discord on Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\":[{\"title\":\"Deploiement ITIC CRE Reussi\",\"description\":\"Le deploiement s'est termine avec succes sur le serveur.\",\"color\":3066993,\"fields\":[{\"name\":\"Commit\",\"value\":\"${COMMIT_SHA}\",\"inline\":true},{\"name\":\"Branche\",\"value\":\"${BRANCH}\",\"inline\":true}]}]}" \
            "${DISCORD_WEBHOOK}"

      - name: Notify Discord on Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\":[{\"title\":\"Echec du Deploiement ITIC CRE\",\"description\":\"Une erreur est survenue durant le deploiement.\",\"color\":15158332,\"fields\":[{\"name\":\"Commit\",\"value\":\"${COMMIT_SHA}\",\"inline\":true},{\"name\":\"Branche\",\"value\":\"${BRANCH}\",\"inline\":true}]}]}" \
            "${DISCORD_WEBHOOK}"