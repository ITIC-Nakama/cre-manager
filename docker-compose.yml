services:
  postgres:
    image: postgres:16
    container_name: itic-cre-db
    privileged: true  # Permet au conteneur de contourner le blocage pivot_root du serveur LXC
    security_opt:
      - apparmor:unconfined  # Désactive la restriction AppArmor si elle est active sur l'hôte
    environment:
      POSTGRES_DB: ${DB_NAME:-itic_cre}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-itic_cre}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./itic-cre-backend
      dockerfile: Dockerfile
    container_name: itic-cre-api
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-itic_cre}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./itic-cre-frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: itic-cre-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
