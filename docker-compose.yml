services:
  postgres:
    image: postgres:16-alpine
    container_name: itic-career-center-db
    environment:
      POSTGRES_DB: itic_career_center
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d itic_career_center"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: itic-career-center-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/itic_career_center
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
