# Application — ITIC CRE
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}
spring.application.name=itic-cre-api
server.servlet.context-path=/api/v1

# JWT
security.jwt.token.secret-key=${SECRET_KEY:dev-secret-key-change-in-production}
security.jwt.token.refresh-secret-key=${REFRESH_SECRET_KEY:dev-refresh-secret-key-change-in-production}
security.jwt.token.expiration=${TOKEN_EXPIRATION_TIME:3600000}
security.jwt.token.refresh-expiration=${REFRESH_TOKEN_EXPIRATION_TIME:604800000}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:itic_cre}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# OTP
app.otp.expiration-minutes=10
app.otp.length=6
app.mail.from=${SMTP_FROM:no-reply@itic-cre.fr}
app.brand.name=ITIC CRE

# Comptes de test — À SUPPRIMER avant la mise en production
app.test.seeders.enabled=${TEST_SEEDERS_ENABLED:false}

# Premier administrateur (désactiver en production après création)
app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.first-name=${BOOTSTRAP_ADMIN_FIRST_NAME:Admin}
app.bootstrap.admin.last-name=${BOOTSTRAP_ADMIN_LAST_NAME:ITIC}

# Mail (SMTP)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS (React PWA + espace conseiller)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Storage Configuration (local or r2)
storage.provider=${STORAGE_PROVIDER:local}

# Local Storage Configuration
storage.local.directory=${STORAGE_LOCAL_DIR:./uploads}
storage.local.base-url=${STORAGE_LOCAL_BASE_URL:http://localhost:8080/api/v1/files}

# Cloudflare R2 Configuration
storage.r2.endpoint=${STORAGE_R2_ENDPOINT:}
storage.r2.bucket=${STORAGE_R2_BUCKET:}
storage.r2.access-key=${STORAGE_R2_ACCESS_KEY:}
storage.r2.secret-key=${STORAGE_R2_SECRET_KEY:}
storage.r2.public-url=${STORAGE_R2_PUBLIC_URL:}
storage.r2.region=${STORAGE_R2_REGION:weur}
storage.r2.presigned-url-duration-hours=${STORAGE_R2_PRESIGNED_URL_DURATION_HOURS:24}
storage.r2.public-folder=${STORAGE_R2_PUBLIC_FOLDER:public}

# Multipart Config (File uploads)
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}

