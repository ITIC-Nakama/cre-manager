spring.datasource.url=jdbc:h2:mem:itic_cre_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.mail.host=
spring.mail.username=
spring.mail.password=

security.jwt.token.secret-key=test-secret-key-for-testing-only
security.jwt.token.refresh-secret-key=test-refresh-secret-key-for-testing-only
security.jwt.token.expiration=3600000
security.jwt.token.refresh-expiration=604800000

app.otp.length=6
app.otp.expiration-minutes=10
app.mail.from=test@itic-cre.fr
app.cors.allowed-origins=http://localhost:5173
app.bootstrap.admin.enabled=false
